<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Felix Gnass</title>
    <!-- Page styles + shared palette colours (keyed by data-pal/data-inv on <html>).
     The SPA router reconciles these stylesheets on navigation; the shared
     palette.css matches across pages and stays put. -->
    <link rel="stylesheet" href="/home.css" />
    <link rel="stylesheet" href="/palette.css" />
    <!-- Pre-paint palette pick (blocking, classic): sets data-pal on <html> before
     first paint so the page paints in its final palette.css colours — no flash. -->
    <script src="/roll.js"></script>
    <!-- buzz engine, sounds, palette re-roll, SPA router + page logic (bundled). -->
    <script type="module" src="/buzz.js"></script>
  </head>
  <body>
    <p class="kicker">gnass.buzz</p>

    <main>
      <div class="name" id="hero">
        <span class="line">Felix</span>
        <span class="line">Gnass</span>
      </div>

      <div class="info">
        <div class="actions">
          <div class="meta">
            <span>Software Developer</span>
            <span>Hamburg, Germany</span>
          </div>
          <a class="buzz-btn" id="buzz" href="/projects">Projects</a>
          <span class="cta-hint"><span class="arrow">←</span>&nbsp;bzzzt</span>
        </div>
        <nav>
          <a href="https://github.com/fgnass" rel="me">GitHub</a>
          <a href="https://www.linkedin.com/in/fgnass/" rel="me">LinkedIn</a>
          <a href="https://indieweb.social/@fgnass" rel="me">Mastodon</a>
          <a id="email" href="#">E-Mail</a>
        </nav>
      </div>
    </main>
  </body>
</html>
